[build]
  publish = "."

# Block prototype/design artifacts from public production surface
[[redirects]]
  from = "/design-home-proposal.html"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/design-*.html"
  to = "/404.html"
  status = 404
  force = true

# Block non-production/sensitive repository files and paths
[[redirects]]
  from = "/node_modules/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.claude/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.git/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.env*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/scripts/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/skills-lock.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/README*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.mjs"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), browsing-topics=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://lh3.googleusercontent.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/en/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/blog/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/en/blog/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
