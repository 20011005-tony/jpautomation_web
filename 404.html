<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="assets/img/logo-jp-automation.svg" type="image/svg+xml" />
  <link rel="manifest" href="site.webmanifest" />
  <meta name="theme-color" content="#0e0e0e" />
  <title>JP Automation | 404</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0e0e0e;
      color: #f5f5f7;
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
    }
    .card {
      width: min(92vw, 680px);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2rem;
      background: #151515;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: .7rem;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      margin-bottom: 1.2rem;
    }
    .brand img { width: 34px; height: 34px; }
    h1 { margin: 0 0 .75rem; font-size: clamp(2rem, 6vw, 2.8rem); }
    p { margin: 0 0 1.4rem; color: #b8b8bf; line-height: 1.6; }
    .actions { display: flex; flex-wrap: wrap; gap: .75rem; }
    .btn {
      display: inline-block;
      padding: .72rem 1rem;
      border-radius: 10px;
      border: 1px solid #393939;
      color: #f3f3f8;
      text-decoration: none;
      font-weight: 600;
    }
    .btn.primary {
      background: linear-gradient(135deg, #7c5cff, #8f77ff);
      border-color: transparent;
    }
  </style>
</head>
<body>
  <main class="card">
    <a class="brand" href="index.html"><img src="assets/img/logo-jp-automation.svg" alt="JP Automation logo" />JP Automation</a>
    <h1>404 · Page not found</h1>
    <p>Esta página no existe o fue movida. This page does not exist or has moved.</p>
    <div class="actions">
      <a class="btn primary" href="index.html">Inicio (ES)</a>
      <a class="btn" href="en/index.html">Home (EN)</a>
    </div>
  </main>
</body>
</html>
