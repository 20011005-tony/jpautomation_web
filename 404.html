  <style>
/* ===== CRITICAL NAV — zero Tailwind dependency ===== */
nav{position:fixed!important;top:0!important;width:100%!important;z-index:50!important;background:rgba(9,9,11,.85)!important;-webkit-backdrop-filter:blur(20px)!important;backdrop-filter:blur(20px)!important;box-shadow:0 0 20px rgba(168,85,247,.15)!important}
nav>div{display:flex!important;align-items:center!important;justify-content:space-between!important;max-width:80rem!important;margin:0 auto!important;min-height:5rem!important;height:auto!important;padding-left:1.5rem!important;padding-right:1.5rem!important}
@media(min-width:1024px){nav>div>div[class*="hidden"]{display:flex!important}[data-menu-btn]{display:none!important}.mobile-nav{display:none!important}}
.mobile-nav{display:none!important;position:relative;z-index:100;flex-direction:column;padding:0 1.5rem 1.5rem;border-top:1px solid rgba(255,255,255,.05);background:rgba(14,14,14,.98)!important;-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px)}
.mobile-nav.open{display:flex!important}
.mobile-nav a{display:block;padding:.85rem 0;font-size:1rem;font-weight:600;color:#a1a1aa;border-bottom:1px solid rgba(255,255,255,.04);text-decoration:none;transition:color .2s}
.mobile-nav a:hover,.mobile-nav a.active-link{color:#cc97ff}
.mobile-nav .mobile-lang{display:flex;align-items:center;gap:.5rem;padding-top:1rem;margin-top:.5rem;border-top:1px solid rgba(255,255,255,.08);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.mobile-nav .mobile-lang a{display:inline;padding:0;border-bottom:none;font-size:.75rem;text-decoration:none}
.mobile-nav .mobile-lang span{color:#52525b}
.hamburger-line{display:block;width:20px;height:2px;background:#fff;border-radius:2px;transition:transform .3s,opacity .3s}
[data-menu-btn][aria-expanded="true"] .hamburger-line:nth-child(1){transform:translateY(8px) rotate(45deg)}
[data-menu-btn][aria-expanded="true"] .hamburger-line:nth-child(2){opacity:0}
[data-menu-btn][aria-expanded="true"] .hamburger-line:nth-child(3){transform:translateY(-8px) rotate(-45deg)}
    :root { color-scheme: dark; }

      border-radius: 16px;
      padding: 2rem;
      background: #151515;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: .7rem;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      margin-bottom: 1.2rem;
    }
    .brand img { width: 34px; height: 34px; }
    h1 { margin: 0 0 .75rem; font-size: clamp(2rem, 6vw, 2.8rem); }
    p { margin: 0 0 1.4rem; color: #b8b8bf; line-height: 1.6; }
    .actions { display: flex; flex-wrap: wrap; gap: .75rem; }
    .btn {
      display: inline-block;
      padding: .72rem 1rem;
      border-radius: 10px;
      border: 1px solid #393939;
      color: #f3f3f8;
      text-decoration: none;
      font-weight: 600;
    }
    .btn.primary {
      background: linear-gradient(135deg, #7c5cff, #8f77ff);
      border-color: transparent;
    }
  </style>
